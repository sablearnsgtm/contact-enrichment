<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProspectKit — Contact Enrichment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f0f13; }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
    .badge-high { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .badge-medium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .badge-none { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .badge-unknown { background: rgba(148,163,184,0.12); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); }
    input, textarea { background: rgba(255,255,255,0.05) !important; }
    input:focus, textarea:focus { outline: none; border-color: rgba(99,102,241,0.6) !important; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    .tab-active { border-bottom: 2px solid #6366f1; color: #818cf8; }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  </style>
</head>
<body class="min-h-screen text-slate-100 font-sans">

  <!-- API Key Setup Modal -->
  <div id="setup-modal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-7 w-full max-w-md fade-in">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-9 h-9 rounded-xl bg-indigo-500/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        </div>
        <div>
          <h2 class="font-semibold text-white">Connect Apollo</h2>
          <p class="text-slate-500 text-xs">Your key is saved locally and never stored on any server</p>
        </div>
      </div>
      <label class="block text-xs text-slate-400 font-medium mb-1.5 uppercase tracking-wide">Apollo API Key</label>
      <input
        id="modal-api-key"
        type="password"
        placeholder="Paste your Apollo API key..."
        class="w-full border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 mb-2 transition-all"
      />
      <p class="text-xs text-slate-600 mb-5">
        Find it at <a href="https://app.apollo.io/#/settings/integrations/api" target="_blank" class="text-indigo-400 hover:text-indigo-300">app.apollo.io → Settings → API</a>
      </p>
      <button onclick="saveApiKey()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-semibold rounded-xl py-3 text-sm transition-all cursor-pointer">
        Save & Continue
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="border-b border-white/8 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-lg bg-indigo-500 flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <span class="font-bold text-white tracking-tight">ProspectKit</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="key-status" class="text-xs text-slate-500"></span>
      <button onclick="openSettings()" class="text-xs glass px-3 py-1.5 rounded-lg text-slate-400 hover:text-white transition-colors cursor-pointer flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        API Key
      </button>
      <a href="https://github.com/your-username/prospectkit" target="_blank" class="text-slate-500 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white mb-2">Find anyone's contact info</h1>
      <p class="text-slate-400 text-sm">Paste a LinkedIn URL to pull verified emails and phone numbers in seconds.<br/>Powered by Apollo. Free to self-host.</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-0 mb-6 border-b border-white/8 text-sm font-medium">
      <button id="tab-single" onclick="switchTab('single')" class="px-4 py-2.5 tab-active transition-colors text-slate-300 cursor-pointer">Single Lookup</button>
      <button id="tab-bulk" onclick="switchTab('bulk')" class="px-4 py-2.5 border-b-2 border-transparent text-slate-500 hover:text-slate-300 transition-colors cursor-pointer">Bulk (up to 20)</button>
    </div>

    <!-- Single Panel -->
    <div id="panel-single">
      <div class="glass rounded-2xl p-6 mb-5">
        <label class="block text-xs text-slate-400 font-medium mb-2 uppercase tracking-wide">LinkedIn Profile URL</label>
        <input id="linkedin-url" type="text" placeholder="https://www.linkedin.com/in/firstname-lastname"
          class="w-full border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 transition-all" />
        <div class="flex items-center gap-3 my-4">
          <div class="flex-1 border-t border-white/8"></div>
          <span class="text-slate-600 text-xs">or search by name</span>
          <div class="flex-1 border-t border-white/8"></div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs text-slate-400 font-medium mb-1.5">First Name</label>
            <input id="first-name" type="text" placeholder="Jane" class="w-full border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600 transition-all" />
          </div>
          <div>
            <label class="block text-xs text-slate-400 font-medium mb-1.5">Last Name</label>
            <input id="last-name" type="text" placeholder="Smith" class="w-full border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600 transition-all" />
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-400 font-medium mb-1.5">Company <span class="text-slate-600 normal-case font-normal">(optional, improves accuracy)</span></label>
          <input id="company-name" type="text" placeholder="Acme Corp" class="w-full border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-slate-600 transition-all" />
        </div>
        <button id="enrich-btn" onclick="enrichContact()"
          class="mt-5 w-full bg-indigo-500 hover:bg-indigo-400 text-white font-semibold rounded-xl py-3 text-sm transition-all flex items-center justify-center gap-2 cursor-pointer">
          <span id="btn-text">Find Contact</span>
          <svg id="btn-spinner" class="hidden w-4 h-4 spinner" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>
      <div id="result-card" class="hidden fade-in"></div>
    </div>

    <!-- Bulk Panel -->
    <div id="panel-bulk" class="hidden">
      <div class="glass rounded-2xl p-6 mb-5">
        <label class="block text-xs text-slate-400 font-medium mb-2 uppercase tracking-wide">LinkedIn URLs — one per line (max 20)</label>
        <textarea id="bulk-urls" rows="8" placeholder="https://www.linkedin.com/in/person-one&#10;https://www.linkedin.com/in/person-two&#10;..."
          class="w-full border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 transition-all resize-none font-mono"></textarea>
        <button id="bulk-btn" onclick="bulkEnrich()"
          class="mt-4 w-full bg-indigo-500 hover:bg-indigo-400 text-white font-semibold rounded-xl py-3 text-sm transition-all flex items-center justify-center gap-2 cursor-pointer">
          <span id="bulk-btn-text">Enrich All</span>
          <svg id="bulk-spinner" class="hidden w-4 h-4 spinner" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        </button>
      </div>
      <div id="bulk-results"></div>
    </div>
  </main>

  <script>
    const SERVER_HAS_KEY = {{ 'true' if has_server_key else 'false' }};

    function getStoredKey() { return localStorage.getItem('prospectkit_apollo_key') || ''; }
    function saveApiKey() {
      const key = document.getElementById('modal-api-key').value.trim();
      if (!key) return;
      localStorage.setItem('prospectkit_apollo_key', key);
      document.getElementById('setup-modal').classList.add('hidden');
      updateKeyStatus();
    }
    function openSettings() {
      document.getElementById('modal-api-key').value = getStoredKey();
      document.getElementById('setup-modal').classList.remove('hidden');
    }
    function updateKeyStatus() {
      const status = document.getElementById('key-status');
      if (SERVER_HAS_KEY) {
        status.textContent = '🔒 Server key active';
        status.className = 'text-xs text-green-500/70';
      } else if (getStoredKey()) {
        status.textContent = '🔑 Key saved';
        status.className = 'text-xs text-green-500/70';
      } else {
        status.textContent = 'No key set';
        status.className = 'text-xs text-red-400/70';
      }
    }
    function getHeaders() {
      const h = { 'Content-Type': 'application/json' };
      const key = getStoredKey();
      if (key) h['X-Apollo-Key'] = key;
      return h;
    }

    // Show setup modal on first visit if no server key and no local key
    window.addEventListener('load', () => {
      updateKeyStatus();
      if (!SERVER_HAS_KEY && !getStoredKey()) {
        document.getElementById('setup-modal').classList.remove('hidden');
      }
    });
    document.getElementById('setup-modal').addEventListener('click', function(e) {
      if (e.target === this && (SERVER_HAS_KEY || getStoredKey())) this.classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('setup-modal').classList.add('hidden');
      if (e.key === 'Enter' && !document.getElementById('panel-single').classList.contains('hidden')) enrichContact();
    });

    function switchTab(tab) {
      ['single','bulk'].forEach(t => {
        document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
        const btn = document.getElementById(`tab-${t}`);
        btn.classList.toggle('tab-active', t === tab);
        btn.classList.toggle('text-slate-500', t !== tab);
      });
    }

    function badgeClass(c) {
      return { high: 'badge-high', medium: 'badge-medium', none: 'badge-none' }[c] || 'badge-unknown';
    }
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
        btn.classList.add('text-green-400');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('text-green-400'); }, 1500);
      });
    }
    function copyIcon() {
      return `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/><path stroke-linecap="round" stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
    }

    function renderResult(data) {
      if (!data.found) return `
        <div class="glass rounded-2xl p-6 text-center fade-in">
          <div class="text-4xl mb-3">🔍</div>
          <p class="text-slate-300 font-medium">No contact found</p>
          <p class="text-slate-500 text-sm mt-1">${data.message || 'Try adding a company name.'}</p>
        </div>`;

      const emailRows = (data.emails || []).map(e => `
        <div class="flex items-center justify-between py-2.5 border-b border-white/5 last:border-0">
          <div class="flex items-center gap-2.5 min-w-0">
            <span class="text-xs px-2 py-0.5 rounded-full bg-white/8 text-slate-400 shrink-0">${e.type}</span>
            <span class="text-sm text-white font-mono truncate">${e.address}</span>
          </div>
          <button onclick="copyToClipboard('${e.address}', this)" class="ml-3 text-slate-500 hover:text-white shrink-0 transition-colors">${copyIcon()}</button>
        </div>`).join('');

      const phoneBlock = data.phone ? `
        <div class="flex items-center justify-between py-2.5">
          <div class="flex items-center gap-2.5">
            <span class="text-xs px-2 py-0.5 rounded-full bg-white/8 text-slate-400">${data.phone_type || 'phone'}</span>
            <span class="text-sm text-white font-mono">${data.phone}</span>
          </div>
          <button onclick="copyToClipboard('${data.phone}', this)" class="text-slate-500 hover:text-white transition-colors">${copyIcon()}</button>
        </div>` : `<p class="text-slate-500 text-sm py-2">No phone number on file</p>`;

      const avatar = data.photo_url
        ? `<img src="${data.photo_url}" class="w-12 h-12 rounded-full object-cover border border-white/10" onerror="this.style.display='none'" />`
        : `<div class="w-12 h-12 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-300 font-bold text-lg">${(data.name||'?')[0]}</div>`;

      return `
        <div class="glass rounded-2xl overflow-hidden fade-in">
          <div class="px-6 py-5 flex items-center gap-4 border-b border-white/8">
            ${avatar}
            <div class="min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-white text-lg">${data.name}</span>
                <span class="text-xs px-2 py-0.5 rounded-full ${badgeClass(data.email_confidence)}">${data.email_label}</span>
              </div>
              <p class="text-slate-400 text-sm mt-0.5">${data.title}${data.company ? ` · ${data.company}` : ''}</p>
              ${data.location ? `<p class="text-slate-500 text-xs mt-0.5">${data.location}</p>` : ''}
            </div>
            ${data.linkedin_url ? `<a href="${data.linkedin_url}" target="_blank" class="ml-auto text-slate-500 hover:text-white shrink-0 transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a>` : ''}
          </div>
          <div class="px-6 py-4 border-b border-white/8">
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wide mb-2">Email${(data.emails||[]).length > 1 ? 's' : ''}</p>
            ${emailRows || '<p class="text-slate-500 text-sm py-1">No email found</p>'}
          </div>
          <div class="px-6 py-4 border-b border-white/8">
            <p class="text-xs text-slate-500 font-medium uppercase tracking-wide mb-1">Phone</p>
            ${phoneBlock}
          </div>
          <div class="px-6 py-3 bg-white/2 flex items-center gap-2 text-xs text-slate-500">
            <span class="w-1.5 h-1.5 rounded-full ${data.email_confidence === 'high' ? 'bg-green-400' : data.email_confidence === 'medium' ? 'bg-yellow-400' : 'bg-red-400'}"></span>
            Email accuracy: <span class="text-slate-300">${data.email_label}</span>
            <span class="mx-1 text-slate-700">·</span> Source: Apollo
          </div>
        </div>`;
    }

    async function enrichContact() {
      if (!SERVER_HAS_KEY && !getStoredKey()) { openSettings(); return; }
      const linkedinUrl = document.getElementById('linkedin-url').value.trim();
      const firstName = document.getElementById('first-name').value.trim();
      const lastName = document.getElementById('last-name').value.trim();
      const company = document.getElementById('company-name').value.trim();

      document.getElementById('btn-text').textContent = 'Searching…';
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('enrich-btn').disabled = true;
      document.getElementById('result-card').classList.add('hidden');

      try {
        const resp = await fetch('/enrich', {
          method: 'POST', headers: getHeaders(),
          body: JSON.stringify({ linkedin_url: linkedinUrl, first_name: firstName, last_name: lastName, organization_name: company }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Server error');
        document.getElementById('result-card').innerHTML = renderResult(data);
        document.getElementById('result-card').classList.remove('hidden');
      } catch (err) {
        document.getElementById('result-card').innerHTML = `
          <div class="glass rounded-2xl p-5 border border-red-500/20 text-red-400 text-sm fade-in"><strong>Error:</strong> ${err.message}</div>`;
        document.getElementById('result-card').classList.remove('hidden');
      } finally {
        document.getElementById('btn-text').textContent = 'Find Contact';
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('enrich-btn').disabled = false;
      }
    }

    async function bulkEnrich() {
      if (!SERVER_HAS_KEY && !getStoredKey()) { openSettings(); return; }
      const urls = document.getElementById('bulk-urls').value.trim();
      if (!urls) return;
      document.getElementById('bulk-btn-text').textContent = 'Enriching…';
      document.getElementById('bulk-spinner').classList.remove('hidden');
      document.getElementById('bulk-btn').disabled = true;

      try {
        const resp = await fetch('/bulk-enrich', { method: 'POST', headers: getHeaders(), body: JSON.stringify({ urls }) });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Server error');
        renderBulkResults(data.results);
      } catch (err) {
        document.getElementById('bulk-results').innerHTML = `<div class="glass rounded-2xl p-5 border border-red-500/20 text-red-400 text-sm">Error: ${err.message}</div>`;
      } finally {
        document.getElementById('bulk-btn-text').textContent = 'Enrich All';
        document.getElementById('bulk-spinner').classList.add('hidden');
        document.getElementById('bulk-btn').disabled = false;
      }
    }

    function renderBulkResults(results) {
      const rows = results.map(r => {
        const color = r.email_status === 'verified' ? 'text-green-400' : r.email_status === 'not found' ? 'text-red-400' : 'text-yellow-400';
        return `<tr class="border-b border-white/5 hover:bg-white/3">
          <td class="px-4 py-3 text-sm text-white">${r.name||'—'}</td>
          <td class="px-4 py-3 text-sm text-slate-400">${r.title||'—'}</td>
          <td class="px-4 py-3 text-sm text-slate-400">${r.company||'—'}</td>
          <td class="px-4 py-3 text-sm font-mono text-white">${r.email ? `<div class="flex items-center gap-1.5">${r.email}<button onclick="copyToClipboard('${r.email}',this)" class="text-slate-600 hover:text-white">${copyIcon()}</button></div>` : '<span class="text-slate-600">—</span>'}</td>
          <td class="px-4 py-3 text-xs ${color}">${r.email_status||'—'}</td>
          <td class="px-4 py-3 text-sm font-mono text-white">${r.phone ? `<div class="flex items-center gap-1.5">${r.phone}<button onclick="copyToClipboard('${r.phone}',this)" class="text-slate-600 hover:text-white">${copyIcon()}</button></div>` : '<span class="text-slate-600">—</span>'}</td>
        </tr>`;
      }).join('');
      const csv = ['Name,Title,Company,Email,Email Status,Phone'].concat(results.map(r=>`"${r.name}","${r.title}","${r.company}","${r.email}","${r.email_status}","${r.phone}"`)).join('\n');
      document.getElementById('bulk-results').innerHTML = `
        <div class="glass rounded-2xl overflow-hidden fade-in">
          <div class="px-5 py-3.5 border-b border-white/8 flex items-center justify-between">
            <span class="text-sm text-slate-300 font-medium">${results.length} contacts enriched</span>
            <button onclick="downloadCSV()" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Download CSV ↓</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead><tr class="text-xs text-slate-500 uppercase tracking-wide border-b border-white/8">
                <th class="px-4 py-3">Name</th><th class="px-4 py-3">Title</th><th class="px-4 py-3">Company</th>
                <th class="px-4 py-3">Email</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Phone</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
      window._csvData = csv;
    }
    function downloadCSV() {
      if (!window._csvData) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([window._csvData], { type: 'text/csv' }));
      a.download = 'prospects.csv'; a.click();
    }
  </script>
</body>
</html>
